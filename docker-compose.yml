services:
  backend:
    build: ./backend
    container_name: cyberguard-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./HRDataset.csv:/app/HRDataset.csv
      - model-artifacts:/app/model/artifacts
      - processed-data:/app/data/processed
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: cyberguard-ui
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  model-artifacts:
  processed-data:
